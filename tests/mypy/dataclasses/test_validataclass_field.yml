# yaml-language-server: $schema=https://raw.githubusercontent.com/typeddjango/pytest-mypy-plugins/master/pytest_mypy_plugins/schema.json

# Check the inference of the return type of validataclass_field()
- case: validataclass_field_return_type
  main: |
    from validataclass.dataclasses import Default, NoDefault, validataclass_field
    from validataclass.validators import RejectValidator, StringValidator

    reveal_type(validataclass_field(StringValidator()))                                         # N: Revealed type is "dataclasses.Field[builtins.str]"
    reveal_type(validataclass_field(StringValidator(), default=NoDefault))                      # N: Revealed type is "dataclasses.Field[builtins.str]"
    reveal_type(validataclass_field(StringValidator(), default=Default(None)))                  # N: Revealed type is "dataclasses.Field[builtins.str | None]"
    reveal_type(validataclass_field(StringValidator(), default=Default(0), repr=False))         # N: Revealed type is "dataclasses.Field[builtins.str | builtins.int]"
    reveal_type(validataclass_field(StringValidator(), default=Default(0), metadata={'a': 1}))  # N: Revealed type is "dataclasses.Field[builtins.str | builtins.int]"

    reveal_type(validataclass_field(RejectValidator()))                         # N: Revealed type is "dataclasses.Field[Never]"
    reveal_type(validataclass_field(RejectValidator(), default=Default(None)))  # N: Revealed type is "dataclasses.Field[None]"

# Check that using validataclass_field() with raw default values or dataclasses.MISSING is reported as deprecated.
- case: validataclass_field_with_raw_defaults_deprecated
  # Use regex matching here because the error messages are sooo long
  regex: true
  main: |
    import dataclasses
    from validataclass.dataclasses import validataclass_field
    from validataclass.validators import StringValidator

    validataclass_field(StringValidator(), default='')                   # E: overload .* is deprecated: Use default objects instead of raw defaults or dataclasses\.MISSING  \[deprecated\]
    validataclass_field(StringValidator(), default=None)                 # E: overload .* is deprecated: Use default objects instead of raw defaults or dataclasses\.MISSING  \[deprecated\]
    validataclass_field(StringValidator(), default=dataclasses.MISSING)  # E: overload .* is deprecated: Use default objects instead of raw defaults or dataclasses\.MISSING  \[deprecated\]
