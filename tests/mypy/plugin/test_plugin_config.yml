# yaml-language-server: $schema=https://raw.githubusercontent.com/typeddjango/pytest-mypy-plugins/master/pytest_mypy_plugins/schema.json

# Test parsing a complete plugin config without errors
- case: complete_plugin_config
  mypy_config: |
    [tool.mypy.x_validataclass]
    debug_mode = true
    custom_validataclass_decorators = []
  main: |
    pass

# Test plugin config with allow_incompatible_field_overrides=false (i.e. strict rules for field type overrides)
- case: disallow_incompatible_field_overrides
  mypy_config: |
    [tool.mypy.x_validataclass]
    allow_incompatible_field_overrides = false
  main: |
    from validataclass.dataclasses import validataclass, Default, DefaultUnset
    from validataclass.helpers import UnsetValueType
    from validataclass.validators import IntegerValidator, RejectValidator, StringValidator

    @validataclass
    class Base:
        field1: int = IntegerValidator()
        field2: int = IntegerValidator(), Default(0)
        field3: str | None = StringValidator(), Default(None)
        field4: int | UnsetValueType = IntegerValidator()

    @validataclass
    class GoodSub(Base):
        # Unchanged field type, default with same type
        field1: int = Default(0)

        # Unchanged field type, compatible validator (default is still 0): `Never | int` is the same as `int`
        field2: int = RejectValidator()

        # Unchanged field type, compatible default: `str` is contained in `str | None`
        field3: str | None = Default('')

        # Unchanged field type, compatible validator and default: `UnsetValueType` is contained in `int | UnsetValueType`
        field4: int | UnsetValueType = RejectValidator(), DefaultUnset

    # NOTE: The following sub class is "good" in terms of the assignment check, but violate the mutable-override check.
    # Those are optional rules in mypy (not even included in strict mode), so we're checking them separately.
    # Unless you enable that rule, the following class is "good".

    @validataclass
    class MostlyGoodSub(Base):
        # Type change: `str` is contained in `str | None`
        field3: str = Default('')                                 # E: Covariant override of a mutable attribute (base class "Base" defined the type as "str | None", expression has type "str")  [mutable-override]

        # Type change: `UnsetValueType` is contained in `int | UnsetValueType`
        field4: UnsetValueType = RejectValidator(), DefaultUnset  # E: Covariant override of a mutable attribute (base class "Base" defined the type as "int | UnsetValueType", expression has type "UnsetValueType")  [mutable-override]

    @validataclass
    class BadSub(Base):
        # Incompatible type change: Base class does not allow `None`
        field1: int | None = Default(None)                        # E: Incompatible types in assignment (expression has type "int | None", base class "Base" defined the type as "int")  [assignment]

        # Incompatible type change: Base class is `int`, does not allow `UnsetValueType`
        field2: UnsetValueType = RejectValidator(), DefaultUnset  # E: Incompatible types in assignment (expression has type "UnsetValueType", base class "Base" defined the type as "int")  [assignment]

        # Incompatible type change: Base class is `str | None`, does not allow `int`
        field3: int | None = IntegerValidator()                   # E: Incompatible types in assignment (expression has type "int | None", base class "Base" defined the type as "str | None")  [assignment]

        # Compatible type change, but incompatible validator: Field still has `IntegerValidator` but does not allow `int`
        field4: UnsetValueType = DefaultUnset                     # (line 50, multiple errors see below)
  out: |
    main:50: error: Incompatible types in assignment (expression has type "int | UnsetValueType", variable has type "UnsetValueType")  [assignment]
    main:50: error: Covariant override of a mutable attribute (base class "Base" defined the type as "int | UnsetValueType", expression has type "UnsetValueType")  [mutable-override]

# Test plugin config with a custom validataclass-like decorator and custom validataclass field functions
- case: custom_validataclass_decorator_and_field_functions
  mypy_config: |
    [tool.mypy.x_validataclass]
    custom_validataclass_decorators = [
        "main.custom_validataclass_decorator",
    ]
    custom_field_functions = [
        "main.custom_validataclass_field",
    ]
  main: |
    from typing import Any, TypeVar
    from typing_extensions import dataclass_transform
    from validataclass.dataclasses import Default, validataclass, validataclass_field
    from validataclass.validators import IntegerValidator, Validator

    T = TypeVar('T')

    @dataclass_transform(kw_only_default=True)
    def custom_validataclass_decorator(cls: type[T]) -> type[T]:
        return validataclass(cls)

    def custom_other_decorator(cls: type[T]) -> type[T]:
        return cls

    def custom_validataclass_field(validator: Validator[Any], **kwargs: Any) -> Any:
        return validataclass_field(validator)

    @custom_validataclass_decorator
    class CustomValidataclass:
        # Valid fields
        field1: int = IntegerValidator()
        field2: int | None = IntegerValidator(), Default(None)
        explicit_field: int = custom_validataclass_field(IntegerValidator())

        # Validataclass field with incorrect type
        invalid_type: str = IntegerValidator(), Default(None)  # E: Incompatible types in assignment (expression has type "int | None", variable has type "str")  [assignment]
        invalid_explicit: str = custom_validataclass_field(IntegerValidator())  # E: Incompatible types in assignment (expression has type "int", variable has type "str")  [assignment]

        # Not a valid validataclass field
        invalid_field: int = 42  # E: Unexpected type "Literal[42]?" in field definition (expected Validator or BaseDefault)  [validataclass]

    @custom_other_decorator
    class DecoratedRegularClass:
        # Regular class attribute (valid, this is not a validataclass!)
        regular_attr: int = 42

        # Validataclass field in a class that's not a validataclass
        invalid_field: int = IntegerValidator()  # E: Incompatible types in assignment (expression has type "IntegerValidator", variable has type "int")  [assignment]

# Test plugin config with incorrectly defined custom validataclass-like decorators
- case: invalid_custom_validataclass_decorators
  mypy_config: |
    [tool.mypy.x_validataclass]
    custom_validataclass_decorators = [
        "main.custom_validataclass_decorator1",
        "main.custom_validataclass_decorator2",
    ]
  main: |
    from typing import Any, TypeVar
    from typing_extensions import dataclass_transform
    from validataclass.dataclasses import Default, validataclass
    from validataclass.validators import IntegerValidator

    T = TypeVar('T')

    # No @dataclass_transform!
    def custom_validataclass_decorator1(cls: type[T]) -> type[T]:
        return validataclass(cls)

    # Missing kw_only_default=True
    @dataclass_transform()
    def custom_validataclass_decorator2(cls: type[T]) -> type[T]:
        return validataclass(cls)

    @custom_validataclass_decorator1  # E: Custom validataclass decorator was not decorated with typing.dataclass_transform  [validataclass-decorator]
    class CustomValidataclass1:
        field1: int = IntegerValidator()  # E: Incompatible types in assignment (expression has type "IntegerValidator", variable has type "int")  [assignment]

    @custom_validataclass_decorator2  # E: Custom validataclass decorator should be defined with kw_only_default=True  [validataclass-decorator]
    class CustomValidataclass2:
        field1: int = IntegerValidator()
        field2: int | None = IntegerValidator(), Default(None)
        invalid_type: str = IntegerValidator(), Default(None)  # E: Incompatible types in assignment (expression has type "int | None", variable has type "str")  [assignment]

# Test plugin config with custom user-defined types that should be ignored in field definitions
- case: validataclass_with_custom_types_in_fields
  mypy_config: |
    [tool.mypy.x_validataclass]
    custom_validataclass_decorators = [
        "main.custom_validataclass_decorator",
    ]
    ignore_custom_types_in_fields = [
        "main.BaseCustomType",
    ]
  main: |
    from typing import Any, TypeVar
    from typing_extensions import dataclass_transform
    from validataclass.dataclasses import Default, validataclass
    from validataclass.validators import IntegerValidator

    T = TypeVar('T')

    @dataclass_transform(kw_only_default=True)
    def custom_validataclass_decorator(cls: type[T]) -> type[T]:
        return validataclass(cls)

    class BaseCustomType:
        value: str
        def __init__(self, value: str):
            self.value = value

    class ExampleCustomType(BaseCustomType):
        pass

    @custom_validataclass_decorator
    class CustomValidataclass:
        field1: int = IntegerValidator()
        field2: int = IntegerValidator(), BaseCustomType('banana')
        field3: int | None = ExampleCustomType('banana'), IntegerValidator(), Default(None)
